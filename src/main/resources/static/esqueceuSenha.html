<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - SGP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="css/esqueceuSenha.css">
    <script type="text/javascript" src="js/esqueceuSenha.js"></script>
</head>
<body>

    <div class="main-container d-flex align-items-center justify-content-center min-vh-100">
        <div class="container">
            <div class="row align-items-center justify-content-center">
                
                <div class="col-12 col-lg-5 text-center mb-5 mb-lg-0 pe-lg-5">
                    
                    <div class="sgp-css-logo mb-4">
                        <div class="sgp-logo-top">
                            <i class="fa-solid fa-gear sgp-gear-icon"></i>
                            <h1 class="sgp-title-letters">
                                <span class="sgp-blue-letters">SG</span><span class="sgp-silver-letter">P</span>
                            </h1>
                        </div>
                        <p class="sgp-subtitle-text">SISTEMA DE GESTÃO DE PEÇAS</p>
                    </div>

                    <h2 class="fw-bold text-dark-blue mb-3 mt-4">Recuperar senha</h2>
                    <p class="text-muted text-description">
                        Informe seu e-mail cadastrado para receber<br class="d-none d-md-block">
                        um código de recuperação.
                    </p>
                </div>

                <div class="col-12 col-lg-5">
                    <div class="card login-card border-0">
                        <div class="card-body p-4 p-md-5">
                            <h4 class="fw-bold text-dark-blue mb-2">Esqueceu sua senha?</h4>
                            <p class="text-muted mb-4 small">Digite seu e-mail para confirmar sua conta e receber o código.</p>

                            <form action="#">
                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-dark-blue small">E-mail</label>
                                    <div class="custom-input-group">
                                        <i class="fa-regular fa-envelope icon-muted"></i>
                                        <input type="email" class="form-control" placeholder="Digite seu e-mail" required id="emailDigitado">
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100 fw-semibold">
                                    Enviar código
                                </button>
                            </form>

                            <hr class="my-4" style="border-color: #cbd5e1;">

                            <div class="d-flex align-items-center">
                                <a href="index.html" class="action-link text-decoration-none small fw-medium">
                                    <i class="fa-solid fa-arrow-left me-2"></i> Voltar para o login
                                </a>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
