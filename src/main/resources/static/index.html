  <!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>SGP - Login</title>
		<link rel="stylesheet" href="css/style.css">
		<script type="text/javascript" src="js/index.js"	></script>
	</head>
	<body>

	<main class="container">

	<section class="lado-esquerdo">
		<img src="img/logo.png" alt="Logo SGP" class="logo">
		
		<h1>Bem-vindo ao SGP</h1>
		<p>
		O sistema completo para controlar, organizar<br>
		e gerenciar suas peças com eficiência.
		</p>
	</section>

			<section class="card-login">
				<h2>Acesse sua conta</h2>
				<p class="subtitulo">Informe seus dados para entrar no sistema</p>

				<form>
					<label for="email">E-mail</label>
					<div class="input-box">
						<span>✉</span>
						<input type="email" id="email" placeholder="Digite seu e-mail">
					</div>
					
					<label for="senha">Senha</label>
					<div class="input-box">
						<span>🔒</span>
						<input type="password" id="senha" placeholder="Digite sua senha">
						<span onclick="revelar()">👁</span>
					</div>
						
					<button type="button" onclick="logar()">Entrar</button>
				</form>
					
				<div class="divisor">
					<span></span>
					<p>ou</p>
					<span></span>
				</div>
				
				<div class="links">
					<a href="cadastrarUsuario.html">Cadastrar</a>
					<a href="esqueceuSenha.html">Esqueci minha senha</a>
				</div>
			</section>
		</main>
	</body>
</html>
