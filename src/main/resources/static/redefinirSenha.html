<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Redefinir Senha</title>
    <link rel="stylesheet" href="css/redefinirSenha.css">
    <script type="text/javascript" src="js/redefinirSenha.js"></script>
</head>
<body>

    <div class="container">
        <div class="lado-esquerdo">
           <img alt="Logo SGP" src="img/logo.png" class="logo">
            <h1>Redefinição de Acesso</h1>
            <p>Crie uma nova senha forte e segura para recuperar o seu acesso ao Sistema de Gestão de Peças.</p>
        </div>

        <div class="card-login">
            <h2>Criar Nova Senha</h2>
            <p class="subtitulo">Informe e confirme sua nova senha abaixo.</p>

            <form action="#" method="POST">
                
                <label>Nova Senha</label>
                <div class="input-box">
                    <span>🔒</span>
                    <input type="password" id="nova-senha" placeholder="Digite sua nova senha" required>
                </div>

                <label>Confirmar Nova Senha</label>
                <div class="input-box">
                    <span>🔐</span>
                    <input type="password" id="confirmar-senha" placeholder="Repita a nova senha" required>
                </div>

                <button type="button" onclick="novasenha()">Salvar Nova Senha</button>

                <div class="divisor">
                    <span></span> ou <span></span>
                </div>

                <div class="links" style="justify-content: center;">
                    <a href="http://192.168.10.84:8010/index.html">← Voltar para o Login</a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
