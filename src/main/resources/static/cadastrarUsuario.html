<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/cadastrarUsuario.css">
    <script type="text/javascript" src="js/usuario.js" defer></script>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-sidebar">
            <img src="img/logo.png" alt="SGP - Sistema de Gestão de Peças" class="logo-sgp">
            
            <h1 class="sidebar-title">Bem-vindo ao SGP</h1>
            <p class="sidebar-desc">O sistema completo para controlar, organizar e gerenciar suas peças com eficiência. Cadastre-se para começar.</p>
        </div>

        <div class="auth-form-card">
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Voltar para o login
            </a>

            <h2 class="form-title">Criar nova conta</h2>
            <p class="form-subtitle">Preencha os dados abaixo para completar seu cadastro no sistema.</p>

            <form id="formUsuario">
                <span class="section-title">Dados Pessoais</span>
                
                <div class="form-row">
                    <div class="form-group size-60">
                        <label for="nome">Nome completo</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="nome" placeholder="Digite seu nome">
                        </div>
                    </div>
                    <div class="form-group size-40">
                        <label for="cpf">CPF</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-id-card input-icon "></i>
                            <input type="text" id="cpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)" class="" onblur="validadorCPF(this.value)" maxlength="14">
                        </div>
                    </div>
                </div>

                <div class="form-row margin-bottom-lg">
                    <div class="form-group size-50">
                        <label for="email">E-mail</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" id="email" placeholder="Digite seu e-mail">
                        </div>
                    </div>
                    <div class="form-group size-50">
                        <label for="senha">Senha</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="senha" placeholder="Crie uma senha">
                        </div>
                    </div>
                </div>

                <span class="section-title">Endereço</span>

                <div class="form-row">
                    <div class="form-group size-40">
                        <label for="cep">CEP</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" id="cep" placeholder="Digite o CEP" onblur="buscarCep(this.value)" oninput="mascaraCEP(this)"maxlength="9">
                        </div>
                    </div>
                    <div class="form-group size-60">
                        <label for="rua">Rua</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" id="rua" placeholder="Digite o nome da rua">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group size-40">
                        <label for="numero">Número</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-house input-icon"></i>
                            <input type="text" id="numero" placeholder="Número">
                        </div>
                    </div>
                    <div class="form-group size-60">
                        <label for="complemento">Complemento (opcional)</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-file-text input-icon"></i>
                            <input type="text" id="complemento" placeholder="Complemento">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-location-dot input-icon"></i>
                        <input type="text" id="bairro" placeholder="Digite o bairro">
                    </div>
                </div>

                <div class="form-row margin-bottom-lg">
                    <div class="form-group size-60">
                        <label for="cidade">Cidade</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-building input-icon"></i>
                            <input type="text" id="cidade" placeholder="Digite a cidade">
                        </div>
                    </div>
                    <div class="form-group size-40">
                        <label for="estado">Estado</label>
                        <div class="input-icon-wrapper select-wrapper">
                            <i class="fa-solid fa-map input-icon"></i>
							<select id="estado">
  								<option value="" disabled selected>Selecione</option>
    							<option value="AC">Acre</option>
    							<option value="AL">Alagoas</option>
    							<option value="AP">Amapá</option>
    							<option value="AM">Amazonas</option>
    							<option value="BA">Bahia</option>
    							<option value="CE">Ceará</option>
    							<option value="DF">Distrito Federal</option>
    							<option value="ES">Espírito Santo</option>
    							<option value="GO">Goiás</option>
    							<option value="MA">Maranhão</option>
    							<option value="MT">Mato Grosso</option>
    							<option value="MS">Mato Grosso do Sul</option>
    							<option value="MG">Minas Gerais</option>
    							<option value="PA">Pará</option>
    							<option value="PB">Paraíba</option>
    							<option value="PR">Paraná</option>
    							<option value="PE">Pernambuco</option>
    							<option value="PI">Piauí</option>
    							<option value="RJ">Rio de Janeiro</option>
    							<option value="RN">Rio Grande do Norte</option>
    							<option value="RS">Rio Grande do Sul</option>
    							<option value="RO">Rondônia</option>
    							<option value="RR">Roraima</option>
    							<option value="SC">Santa Catarina</option>
    							<option value="SP">São Paulo</option>
    							<option value="SE">Sergipe</option>
    							<option value="TO">Tocantins</option>
							</select>
                        </div>
                    </div>
                </div>

                <span class="section-title">Profissional</span>

                <div class="form-group">
                    <label for="atuacao">Área de atuação</label>
                    <div class="input-icon-wrapper select-wrapper">
                        <i class="fa-solid fa-briefcase input-icon"></i>
                        <select id="atuacao">
                            <option value="" disabled selected>Selecione sua área de atuação</option>
                            <option value="mecanica">Mecânica</option>
                            <option value="vendas">Vendas de Peças</option>
                            <option value="logistica">Logística</option>
                        </select>
                    </div>
                </div>

                <button onclick="salvarUsuario()" type="button" class="btn-submit">Criar Conta</button>
            </form>
        </div>

    </div>

</body>
</html>
