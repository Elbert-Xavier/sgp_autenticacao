<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Criar Conta</title>
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para os Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/cadastrarUsuario.css">
  <script type="text/javascript" src="js/usuario.js"></script>
</head>
<body>

 
    <div class="container">
        
        <!-- Lado Esquerdo: Banner/Logo -->
        <div class="sidebar">
            <div class="logo-container">
                <div class="logo-placeholder">
                    <span class="logo-text-bg">SGP</span>
                </div>
                <p class="logo-subtext">SISTEMA DE GESTÃO DE PEÇAS</p>
            </div>
            <h1 class="sidebar-title">Criar conta</h1>
            <p class="sidebar-desc">Cadastre-se para acessar o sistema de gestão de peças.</p>
        </div>

        <!-- Lado Direito: Formulário -->
        <div class="form-container">
            <a href="#" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>

            <h2 class="form-title">Mais informações</h2>
            <p class="form-subtitle">Preencha os dados abaixo para completar seu cadastro</p>

          <form id="formUsuario">
                <!-- SEÇÃO: Dados Pessoais -->
                <span class="section-title">Dados Pessoais</span>
                
                <!-- Linha: Nome e CPF -->
                <div class="form-row">
                    <div class="form-group size-60">
                        <label for="nome">Nome completo</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="nome" placeholder="Digite seu nome">
                        </div>
                    </div>
                    <div class="form-group size-40">
                        <label for="cpf">CPF</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-id-card input-icon"></i>
                            <input type="text" id="cpf" placeholder="000.000.000-00">
                        </div>
                    </div>
                </div>

                <!-- Linha: E-mail e Senha -->
                <div class="form-row margin-bottom-lg">
                    <div class="form-group size-50">
                        <label for="email">E-mail</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" id="email" placeholder="Digite seu e-mail">
                        </div>
                    </div>
                    <div class="form-group size-50">
                        <label for="senha">Senha</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="senha" placeholder="Crie uma senha">
                        </div>
                    </div>
                </div>

                <!-- SEÇÃO: Endereço Completo -->
                <span class="section-title">Endereço</span>

                <!-- Linha: CEP e Rua -->
                <div class="form-row">
                    <div class="form-group size-40">
                        <label for="cep">CEP</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" id="cep" placeholder="Digite o CEP">
                        </div>
                    </div>
                    <div class="form-group size-60">
                        <label for="rua">Rua</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-location-dot input-icon"></i>
                            <input type="text" id="rua" placeholder="Digite o nome da rua">
                        </div>
                    </div>
                </div>

                <!-- Linha: Número e Complemento -->
                <div class="form-row">
                    <div class="form-group size-40">
                        <label for="numero">Número</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-house input-icon"></i>
                            <input type="text" id="numero" placeholder="Número">
                        </div>
                    </div>
                    <div class="form-group size-60">
                        <label for="complemento">Complemento (opcional)</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-regular fa-file-text input-icon"></i>
                            <input type="text" id="complemento" placeholder="Complemento">
                        </div>
                    </div>
                </div>

                <!-- Linha: Bairro -->
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-location-dot input-icon"></i>
                        <input type="text" id="bairro" placeholder="Digite o bairro">
                    </div>
                </div>

                <!-- Linha: Cidade e Estado -->
                <div class="form-row margin-bottom-lg">
                    <div class="form-group size-60">
                        <label for="cidade">Cidade</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-building input-icon"></i>
                            <input type="text" id="cidade" placeholder="Digite a cidade">
                        </div>
                    </div>
                    <div class="form-group size-40">
                        <label for="estado">Estado</label>
                        <div class="input-icon-wrapper select-wrapper">
                            <i class="fa-solid fa-map input-icon"></i>
                            <select id="estado">
                                <option value="" disabled selected>Selecione</option>
                                <option value="SP">São Paulo</option>
                                <option value="MG">Minas Gerais</option>
                                <option value="RJ">Rio de Janeiro</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SEÇÃO: Profissional -->
                <span class="section-title">Profissional</span>

                <!-- Linha: Área de Atuação -->
                <div class="form-group">
                    <label for="atuacao">Área de atuação</label>
                    <div class="input-icon-wrapper select-wrapper">
                        <i class="fa-solid fa-briefcase input-icon"></i>
                        <select id="atuacao">
                            <option value="" disabled selected>Selecione sua área de atuação</option>
                            <option value="mecanica">Mecânica</option>
                            <option value="vendas">Vendas de Peças</option>
                            <option value="logistica">Logística</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="btn-submit" onclick="salvarUsuario();">Continuar</button>
            </form>
        </div>

    </div>

</body>
</html>
